name: Move NeetCode Files

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  move-files:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Move files
        run: |
          mkdir -p NeetCode
          shopt -s extglob
          for item in *; do
            if [ "$item" != "NeetCode" ] && \
               [ "$item" != ".github" ] && \
               [ "$item" != "README.md" ]; then
              mv "$item" NeetCode/ || true
            fi
          done

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git diff --cached --quiet || git commit -m "Move NeetCode files automatically"
          git push
